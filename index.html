<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Revenge 2Easy</title>
<style>
html, body { margin: 0; padding: 0; }
:root {
  --red-1: #ff1a1a;
  --red-2: #ff3b1f;
  --gold: #ffd54a;
  --text: #ffffff;
  --bg: #0d0000;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  min-height: 100vh;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background-color: var(--bg);
  background-image:
    radial-gradient(circle at top center, rgba(255,120,0,0.10), transparent 28%),
    linear-gradient(to bottom, rgba(0,0,0,0.08), rgba(0,0,0,0.55)),
    url("./background.jpg");
  background-repeat: no-repeat;
  background-position: center top;
  background-size: cover;
  background-attachment: fixed;
  color: var(--text);
  overflow-x: hidden;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at 15% 18%, rgba(255,130,0,0.12), transparent 12%),
    radial-gradient(circle at 85% 30%, rgba(255,60,0,0.10), transparent 10%),
    radial-gradient(circle at 12% 76%, rgba(255,120,0,0.08), transparent 9%),
    radial-gradient(circle at 88% 82%, rgba(255,90,0,0.08), transparent 10%);
  mix-blend-mode: screen;
  z-index: 0;
}

/* ══════════════ SPLASH SCREEN ══════════════ */
#splash {
  position: fixed;
  inset: 0;
  z-index: 99999;
  background: rgba(0,0,0,0.96);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  animation: splashFadeOut 0.6s ease 10s forwards;
}
@keyframes splashFadeOut {
  0%   { opacity: 1; pointer-events: all; }
  100% { opacity: 0; pointer-events: none; visibility: hidden; }
}
.splash-img-wrap {
  position: relative;
  max-width: min(88vw, 720px);
  border-radius: 20px;
  overflow: hidden;
  box-shadow:
    0 0 0 2px rgba(255,60,0,0.55),
    0 0 60px rgba(255,60,0,0.50),
    0 0 120px rgba(255,30,0,0.30),
    0 32px 80px rgba(0,0,0,0.80);
  animation: splashGlow 2s ease-in-out infinite alternate;
}
@keyframes splashGlow {
  from { box-shadow: 0 0 0 2px rgba(255,60,0,0.55), 0 0 60px rgba(255,60,0,0.50), 0 0 120px rgba(255,30,0,0.25), 0 32px 80px rgba(0,0,0,0.80); }
  to   { box-shadow: 0 0 0 3px rgba(255,100,0,0.80), 0 0 90px rgba(255,80,0,0.75), 0 0 180px rgba(255,50,0,0.45), 0 32px 80px rgba(0,0,0,0.80); }
}
#splash-img {
  display: block;
  width: 100%;
  height: auto;
  max-height: 72vh;
  object-fit: contain;
  border-radius: 20px;
}
.splash-bar-wrap {
  margin-top: 24px;
  width: min(88vw, 720px);
  height: 4px;
  background: rgba(255,255,255,0.10);
  border-radius: 4px;
  overflow: hidden;
}
.splash-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #ff3b1f, #ffd54a);
  border-radius: 4px;
  animation: barFill 10s linear forwards;
}
@keyframes barFill {
  from { width: 0%; }
  to   { width: 100%; }
}
.splash-label {
  margin-top: 14px;
  font-size: 13px;
  font-weight: 700;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.5px;
}
.splash-skip {
  margin-top: 18px;
  padding: 8px 22px;
  border-radius: 50px;
  border: 1.5px solid rgba(255,60,0,0.45);
  background: rgba(180,20,0,0.25);
  color: rgba(255,255,255,0.65);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all .18s;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}
.splash-skip:hover {
  border-color: rgba(255,80,0,0.80);
  color: #fff;
  background: rgba(200,30,0,0.40);
}

/* LANG TOGGLE */
.lang-toggle {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 100;
  display: flex;
  gap: 6px;
}
.lang-btn {
  padding: 6px 14px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.5px;
  border: 1.5px solid rgba(255,255,255,0.20);
  background: rgba(0,0,0,0.55);
  color: rgba(255,255,255,0.55);
  cursor: pointer;
  transition: all .18s;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.lang-btn.active {
  border-color: rgba(255,60,0,0.70);
  color: #fff;
  background: rgba(180,20,0,0.40);
  box-shadow: 0 0 10px rgba(255,40,0,0.30);
}
.lang-btn:hover:not(.active) {
  border-color: rgba(255,255,255,0.40);
  color: #fff;
}

/* HEADER */
.header {
  position: relative;
  z-index: 10;
  width: 100%;
  padding: 28px 24px 0;
  max-width: 960px;
  margin: 0 auto;
}
.header-inner {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}
.header-text { flex: 1; }
.page-title {
  font-size: clamp(28px, 6vw, 52px);
  font-weight: 900;
  letter-spacing: -1px;
  line-height: 1.05;
  background: linear-gradient(135deg, #fff 30%, #ff7a4a 70%, var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  margin: 0 0 8px;
  animation: glowPulse 3.5s ease-in-out infinite;
}
@keyframes glowPulse {
  0%  { filter: drop-shadow(0 0 6px rgba(255,80,0,0.30)); }
  50% { filter: drop-shadow(0 0 18px rgba(255,100,0,0.55)); }
  100%{ filter: drop-shadow(0 0 6px rgba(255,80,0,0.30)); }
}
.page-subtitle {
  font-size: clamp(13px, 2.5vw, 16px);
  color: rgba(255,255,255,0.62);
  font-weight: 500;
  line-height: 1.5;
  max-width: 560px;
}
.header-badges {
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: flex-end;
  flex-shrink: 0;
}
.badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 8px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.3px;
  border: 1.5px solid;
  white-space: nowrap;
  cursor: default;
  transition: transform .18s, box-shadow .18s;
  text-decoration: none;
}
.badge-count {
  background: linear-gradient(135deg, rgba(255,30,0,0.18), rgba(255,80,0,0.10));
  border-color: rgba(255,60,0,0.50);
  color: rgba(255,255,255,0.85);
  box-shadow: 0 0 12px rgba(255,30,0,0.20);
}
.header-divider {
  position: relative;
  z-index: 1;
  max-width: 960px;
  margin: 20px auto 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,60,0,0.45) 30%, rgba(255,60,0,0.45) 70%, transparent);
}

/* LOADING STATE */
.grid-loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px 0;
  gap: 12px;
  color: rgba(255,255,255,0.40);
  font-size: 14px;
  font-weight: 600;
}
.spinner {
  width: 22px; height: 22px;
  border: 2.5px solid rgba(255,60,0,0.20);
  border-top-color: rgba(255,60,0,0.80);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* GRID */
.grid-container {
  position: relative;
  z-index: 1;
  max-width: 960px;
  margin: 0 auto;
  padding: 24px 16px 48px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
@media (max-width: 600px) {
  .grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .header { padding: 20px 16px 0; }
  .header-badges { display: none; }
  .page-title { font-size: 28px; }
}
@media (max-width: 360px) {
  .grid { grid-template-columns: 1fr 1fr; gap: 6px; }
}

/* CARD */
.media-card {
  position: relative;
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  border: 1.5px solid rgba(255,40,0,0.25);
  background: rgba(20,0,0,0.6);
  box-shadow: 0 4px 18px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.04);
  transition: transform .22s cubic-bezier(.34,1.56,.64,1), box-shadow .22s ease, border-color .22s ease;
  aspect-ratio: 16/10;
  animation: fadeUp .4s ease both;
}
.media-card:hover {
  transform: translateY(-4px) scale(1.025);
  border-color: rgba(255,60,0,0.65);
  box-shadow: 0 0 0 1px rgba(255,60,0,0.30), 0 8px 28px rgba(255,30,0,0.30), 0 16px 40px rgba(0,0,0,0.50);
}
.media-card img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  transition: transform .35s ease;
}
.media-card:hover img { transform: scale(1.06); }
.media-card::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(110deg, rgba(255,255,255,0) 30%, rgba(255,255,255,0.06) 50%, rgba(255,255,255,0) 70%);
  transform: translateX(-100%);
  transition: none;
  pointer-events: none;
}
.media-card:hover::after { transform: translateX(100%); transition: transform .6s ease; }
.card-num {
  position: absolute; top: 7px; left: 8px;
  background: rgba(0,0,0,0.65); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  border-radius: 8px; padding: 2px 7px; font-size: 11px; font-weight: 800;
  color: rgba(255,200,100,0.80); border: 1px solid rgba(255,180,0,0.20); pointer-events: none;
}
.card-zoom-icon {
  position: absolute; bottom: 7px; right: 8px;
  background: rgba(0,0,0,0.60); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  border-radius: 8px; padding: 4px 8px; font-size: 13px; opacity: 0;
  transition: opacity .18s; pointer-events: none;
}
.media-card:hover .card-zoom-icon { opacity: 1; }

/* CARD FEATURED (photo_24 - prima posizione) */
.media-card.featured {
  border-color: rgba(255,180,0,0.70) !important;
  box-shadow:
    0 0 0 2px rgba(255,200,0,0.40),
    0 0 30px rgba(255,160,0,0.55),
    0 0 60px rgba(255,100,0,0.30),
    0 8px 28px rgba(0,0,0,0.55) !important;
  animation: featuredGlow 2.5s ease-in-out infinite alternate, fadeUp .4s ease both !important;
}
@keyframes featuredGlow {
  from {
    box-shadow:
      0 0 0 2px rgba(255,200,0,0.40),
      0 0 30px rgba(255,160,0,0.55),
      0 0 60px rgba(255,100,0,0.25),
      0 8px 28px rgba(0,0,0,0.55);
    border-color: rgba(255,180,0,0.70);
  }
  to {
    box-shadow:
      0 0 0 3px rgba(255,220,0,0.70),
      0 0 50px rgba(255,200,0,0.80),
      0 0 100px rgba(255,140,0,0.50),
      0 8px 28px rgba(0,0,0,0.55);
    border-color: rgba(255,220,0,1.0);
  }
}
.media-card.featured:hover {
  transform: translateY(-6px) scale(1.030);
}
.card-featured-badge {
  position: absolute; top: 7px; right: 8px;
  background: linear-gradient(135deg, rgba(255,180,0,0.90), rgba(255,100,0,0.85));
  border-radius: 8px; padding: 3px 8px; font-size: 10px; font-weight: 900;
  color: #fff; letter-spacing: 0.4px; pointer-events: none;
  text-shadow: 0 1px 3px rgba(0,0,0,0.50);
  box-shadow: 0 2px 8px rgba(255,140,0,0.50);
}

@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

/* LIGHTBOX */
#lightbox {
  display: none; position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,0.92); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  align-items: center; justify-content: center; padding: 16px;
}
#lightbox.visible { display: flex; }
.lb-inner {
  position: relative; max-width: min(90vw, 900px); max-height: 90vh;
  animation: popIn .25s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes popIn { from{transform:scale(0.82);opacity:0} to{transform:scale(1);opacity:1} }
#lb-img {
  display: block; max-width: 100%; max-height: 85vh; border-radius: 16px;
  border: 2px solid rgba(255,60,0,0.40);
  box-shadow: 0 0 60px rgba(255,30,0,0.25), 0 24px 60px rgba(0,0,0,0.70);
  object-fit: contain;
}
.lb-arrow {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: linear-gradient(135deg, rgba(40,0,0,0.88), rgba(80,10,10,0.82));
  border: 1.5px solid rgba(255,60,0,0.45); border-radius: 50%;
  width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 20px; color: #fff;
  box-shadow: 0 0 16px rgba(255,30,0,0.30);
  transition: transform .18s, box-shadow .18s, background .18s;
  user-select: none; z-index: 2;
}
.lb-arrow:hover {
  transform: translateY(-50%) scale(1.12);
  box-shadow: 0 0 24px rgba(255,50,0,0.55);
  background: linear-gradient(135deg, rgba(80,5,5,0.95), rgba(110,15,15,0.90));
}
.lb-prev { left: -54px; } .lb-next { right: -54px; }
@media (max-width: 600px) {
  .lb-prev { left: -2px; } .lb-next { right: -2px; }
  .lb-arrow { width: 36px; height: 36px; font-size: 16px; }
}
.lb-close {
  position: absolute; top: -44px; right: 0; background: none; border: none;
  color: rgba(255,255,255,0.65); font-size: 28px; cursor: pointer;
  padding: 4px 8px; transition: color .18s, transform .18s; line-height: 1;
}
.lb-close:hover { color: #fff; transform: scale(1.15); }
.lb-counter {
  position: absolute; bottom: -36px; left: 50%; transform: translateX(-50%);
  font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.45); white-space: nowrap;
}
.footer {
  position: relative; z-index: 1; text-align: center; padding-bottom: 32px;
  font-size: 12px; color: rgba(255,255,255,0.22); font-weight: 600; letter-spacing: 0.5px;
}
</style>
</head>
<body>

<!-- SPLASH SCREEN -->
<div id="splash">
  <div class="splash-img-wrap">
    <img id="splash-img"
      src="https://raw.githubusercontent.com/ArmatarozzaCR/revenge2easy/main/photo_24_2026-05-21_14-10-20.jpg"
      alt="Foto in evidenza"
      width="720" height="450"
    />
  </div>
  <div class="splash-bar-wrap"><div class="splash-bar"></div></div>
  <div class="splash-label" id="splash-label">Apertura tra 10 secondi…</div>
  <button class="splash-skip" onclick="closeSplash()">Vai alla galleria ›</button>
</div>

<!-- TOGGLE LINGUA -->
<div class="lang-toggle">
  <button class="lang-btn active" onclick="setLang('it')" id="btn-it">🇮🇹 IT</button>
  <button class="lang-btn" onclick="setLang('ru')" id="btn-ru">🇷🇺 RU</button>
</div>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div class="header-text">
      <h1 class="page-title">⚔️ Revenge 2Easy</h1>
      <p class="page-subtitle" id="subtitle">Le prove non mentono. Ogni screenshot racconta come è andata davvero.</p>
    </div>
    <div class="header-badges">
      <span class="badge badge-count" id="badge-count">📸 — prove</span>
    </div>
  </div>
</header>
<div class="header-divider"></div>

<!-- GRID -->
<main class="grid-container">
  <div id="grid-loading" class="grid-loading">
    <div class="spinner"></div>
    <span id="loading-text">Caricamento foto…</span>
  </div>
  <div class="grid" id="grid"></div>
</main>

<div class="footer" id="footer">ARMATA ROZZA © 2025</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox(event)">
  <div class="lb-inner">
    <button class="lb-close" onclick="closeLB()">✕</button>
    <div class="lb-arrow lb-prev" onclick="navLB(-1)">&#8249;</div>
    <img id="lb-img" src="" alt="Prova" />
    <div class="lb-arrow lb-next" onclick="navLB(1)">&#8250;</div>
    <div class="lb-counter" id="lb-counter"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════
const OWNER  = "ArmatarozzaCR";
const REPO   = "revenge2easy";
const BRANCH = "main";
const RAW    = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/`;
const API    = `https://api.github.com/repos/${OWNER}/${REPO}/contents?ref=${BRANCH}`;

// La foto che va in primo piano (splash + prima posizione + glow)
const FEATURED_PHOTO = "photo_24_2026-05-21_14-10-20.jpg";

// ══════════════════════════════════════════
//  SPLASH
// ══════════════════════════════════════════
let splashTimer = null;
const splashEl = document.getElementById("splash");

function closeSplash() {
  clearTimeout(splashTimer);
  clearInterval(countdownInterval);
  splashEl.style.animation = "none";
  splashEl.style.opacity = "0";
  splashEl.style.transition = "opacity .5s ease";
  splashEl.style.pointerEvents = "none";
  setTimeout(() => { splashEl.style.visibility = "hidden"; }, 500);
}

let countdown = 10;
const splashLabel = document.getElementById("splash-label");
const countdownInterval = setInterval(() => {
  countdown--;
  if (countdown <= 0) {
    clearInterval(countdownInterval);
    splashLabel.textContent = "";
  } else {
    splashLabel.textContent = `Apertura tra ${countdown} second${countdown === 1 ? "o" : "i"}…`;
  }
}, 1000);

splashTimer = setTimeout(closeSplash, 10000);

// ══════════════════════════════════════════
//  TRADUZIONI
// ══════════════════════════════════════════
const TRANSLATIONS = {
  it: {
    subtitle:      "Le prove non mentono. Ogni screenshot racconta come è andata davvero.",
    badgeCount:    (n) => `📸 ${n} prove`,
    imgAlt:        "Prova",
    counter:       (i, tot) => `${i} / ${tot}`,
    footer:        "ARMATA ROZZA © 2025",
    loading:       "Caricamento foto…",
    featuredBadge: "⭐ TOP",
  },
  ru: {
    subtitle:      "Доказательства не лгут. Каждый скриншот рассказывает, как всё было на самом деле.",
    badgeCount:    (n) => `📸 ${n} доказательств`,
    imgAlt:        "Доказательство",
    counter:       (i, tot) => `${i} из ${tot}`,
    footer:        "ARMATA ROZZA © 2025",
    loading:       "Загрузка фото…",
    featuredBadge: "⭐ ТОП",
  }
};

let currentLang = "it";
let currentIdx  = 0;
let FILES       = [];

// ══════════════════════════════════════════
//  FETCH PHOTOS FROM GITHUB API
// ══════════════════════════════════════════
async function fetchPhotos() {
  try {
    const res  = await fetch(API);
    if (!res.ok) throw new Error("API error " + res.status);
    const data = await res.json();

    let photos = data
      .filter(f => f.type === "file" && /\.(jpg|jpeg|png|webp)$/i.test(f.name))
      .map(f => f.name);

    const featured = photos.filter(p => p === FEATURED_PHOTO);
    const rest     = photos.filter(p => p !== FEATURED_PHOTO)
      .sort((a, b) => {
        const na = parseInt(a.match(/\d+/) || [0], 10);
        const nb = parseInt(b.match(/\d+/) || [0], 10);
        return na - nb;
      });

    FILES = [...featured, ...rest];
    buildGrid();
  } catch (err) {
    console.error("Fetch error:", err);
    fallbackBuild();
  }
}

function fallbackBuild() {
  const known = 28;
  const arr = [];
  const suffix = "_2026-05-21_14-10-20.jpg";
  for (let i = 1; i <= known; i++) arr.push(`photo_${i}${suffix}`);
  const featured = arr.filter(p => p === FEATURED_PHOTO);
  const rest = arr.filter(p => p !== FEATURED_PHOTO);
  FILES = [...featured, ...rest];
  buildGrid();
}

// ══════════════════════════════════════════
//  BUILD GRID
// ══════════════════════════════════════════
function buildGrid() {
  const loadingEl = document.getElementById("grid-loading");
  const grid = document.getElementById("grid");

  loadingEl.style.display = "none";

  const t = TRANSLATIONS[currentLang];
  document.getElementById("badge-count").textContent = t.badgeCount(FILES.length);

  grid.innerHTML = "";

  FILES.forEach((file, i) => {
    const isFeatured = (file === FEATURED_PHOTO);
    const card = document.createElement("div");
    card.className = "media-card" + (isFeatured ? " featured" : "");
    card.style.animationDelay = `${Math.min(i * 0.03, 0.6)}s`;
    card.onclick = () => openLB(i);

    const img = document.createElement("img");
    img.src = RAW + file;
    img.alt = `${t.imgAlt} ${i + 1}`;
    img.loading = i < 6 ? "eager" : "lazy";
    img.decoding = "async";
    img.width  = 480;
    img.height = 300;

    const num = document.createElement("span");
    num.className = "card-num";
    num.textContent = i + 1;

    if (isFeatured) {
      const badge = document.createElement("span");
      badge.className = "card-featured-badge";
      badge.textContent = t.featuredBadge;
      card.appendChild(badge);
    } else {
      const zoom = document.createElement("span");
      zoom.className = "card-zoom-icon";
      zoom.textContent = "🔍";
      card.appendChild(zoom);
    }

    card.appendChild(img);
    card.appendChild(num);
    grid.appendChild(card);
  });
}

// ══════════════════════════════════════════
//  TRADUZIONI DINAMICHE
// ══════════════════════════════════════════
function setLang(lang) {
  currentLang = lang;
  const t = TRANSLATIONS[lang];
  document.getElementById("subtitle").textContent = t.subtitle;
  document.getElementById("badge-count").textContent = t.badgeCount(FILES.length);
  document.getElementById("footer").textContent = t.footer;
  document.getElementById("loading-text").textContent = t.loading;
  document.querySelectorAll(".media-card img").forEach((img, i) => {
    img.alt = `${t.imgAlt} ${i + 1}`;
  });
  document.querySelectorAll(".card-featured-badge").forEach(el => {
    el.textContent = t.featuredBadge;
  });
  const lbCnt = document.getElementById("lb-counter");
  if (lbCnt.textContent) lbCnt.textContent = t.counter(currentIdx + 1, FILES.length);
  document.getElementById("btn-it").classList.toggle("active", lang === "it");
  document.getElementById("btn-ru").classList.toggle("active", lang === "ru");
  document.documentElement.lang = lang === "ru" ? "ru" : "it";
}

// ══════════════════════════════════════════
//  LIGHTBOX
// ══════════════════════════════════════════
const lb    = document.getElementById("lightbox");
const lbImg = document.getElementById("lb-img");
const lbCnt = document.getElementById("lb-counter");
lbImg.style.transition = "opacity .12s ease, transform .12s ease";

function openLB(idx) {
  currentIdx = idx;
  const t = TRANSLATIONS[currentLang];
  lbImg.src = RAW + FILES[idx];
  lbImg.alt = `${t.imgAlt} ${idx + 1}`;
  lbCnt.textContent = t.counter(idx + 1, FILES.length);
  lb.classList.add("visible");
  document.body.style.overflow = "hidden";
}
function closeLB() {
  lb.classList.remove("visible");
  document.body.style.overflow = "";
}
function closeLightbox(e) { if (e.target === lb) closeLB(); }
function navLB(dir) {
  currentIdx = (currentIdx + dir + FILES.length) % FILES.length;
  const t = TRANSLATIONS[currentLang];
  lbImg.style.opacity = "0";
  lbImg.style.transform = "scale(0.94)";
  setTimeout(() => {
    lbImg.src = RAW + FILES[currentIdx];
    lbImg.alt = `${t.imgAlt} ${currentIdx + 1}`;
    lbCnt.textContent = t.counter(currentIdx + 1, FILES.length);
    lbImg.style.opacity = "1";
    lbImg.style.transform = "scale(1)";
  }, 120);
}

document.addEventListener("keydown", e => {
  if (!lb.classList.contains("visible")) return;
  if (e.key === "ArrowRight") navLB(1);
  if (e.key === "ArrowLeft")  navLB(-1);
  if (e.key === "Escape")     closeLB();
});

let touchStartX = 0;
lb.addEventListener("touchstart", e => { touchStartX = e.touches[0].clientX; }, { passive: true });
lb.addEventListener("touchend", e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) navLB(dx < 0 ? 1 : -1);
});

document.addEventListener("contextmenu", e => e.preventDefault());

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
fetchPhotos();
</script>
